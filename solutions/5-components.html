<!DOCTYPE html>
<html lang="ru" class="h-100">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добавление банковской карты</title>
    <link rel="stylesheet" href="./vendor/bootstrap/bootstrap.min.css">
</head>

<body class="bg-light d-flex align-items-center h-100">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-6 p-4 shadow border-top border-primary" data-testing>
                <h2 class="h5 text-muted mb-3">Добавить карту</h2>
                <form class="bg-white p-3 border rounded">
                    <!-- BEGIN (write your solution here) -->
                    <div class="row mb-3">
                      <div class="col-8">
                        <label class="form-label">Владелец карты</label>
                        <input type="text" class="form-control">
                      </div>
                      <div class="col">
                        <label class="form-label">Срок действия</label>
                        <input type="text" class="form-control">
                      </div>
                    </div>
                    <div class="row mb-3">
                      <div class="col-9">
                        <label class="form-label">Номер карты</label>
                        <input type="number" class="form-control">
                      </div>
                      <div class="col">
                        <label class="form-label">CVC</label>
                        <input type="number" class="form-control">
                      </div>
                    </div>
                    <div class="row mb-3">
                      <div class="col">
                        <label class="form-label">Описание карты</label>
                        <input type="text" class="form-control">
                      </div>
                    </div>
                    <div class="row mb-3">
                      <div class="col">
                        <div class="form-check">
                          <input type="checkbox" class="form-check-input" id="default-card">
                          <label class="form-check-label" for="default-card">Сделать картой по умолчанию</label>
                        </div>
                      </div>
                    </div>
                    <div class="row">
                      <div class="col">
                        <button type="submit" class="btn btn-primary">Добавить карту</button>
                      </div>
                    </div>
<!-- END -->
                </form>
            </div>
        </div>
    </div>
</body>

</html>
